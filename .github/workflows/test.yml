name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  server:
    name: Server unit & integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  app:
    name: App unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bread-sheet-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bread-sheet-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
